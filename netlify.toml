# Netlify configuration for NutriAI

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=self"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com https://generativelanguage.googleapis.com; media-src 'self' blob:; worker-src 'self';"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control         = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
