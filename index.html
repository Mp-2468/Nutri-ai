<script>
// ══════════════════════════════════════

// ══════════════════════════════════════
const GK = "AIzaSyA-agMKNIg35DbVIxo_6RCDvphaLiZn9Ns";
const GM = "gemini-2.5-pro"; // This is the most reliable alias

// ══════════════════════════════════════
//  DESIGN TOKENS
// ══════════════════════════════════════
const C = {

  pink:"#FF6FA3", red:"#FF4D6D", blue:"#5B8FFF", purple:"#A78BFA",

// ══════════════════════════════════════
//  STATE

let S = {
  screen:"home", scanMode:"image", // "image" | "voice"
  log:[], water:0, waterGoal:2500, exercise:[],
  profile:{ weight:70, height:175, age:25, gender:"male", activity:"moderate", goal:"maintain", calorieTarget:2000, name:"" },

// ══════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════
const store = {
  async get(k){ try{ if(window.storage) return await window.storage.get(k); const v=localStorage.getItem(k); return v?{value:v}:null; }catch(e){return null;} },
  async set(k,v){ try{ if(window.storage) return await window.storage.set(k,v); localStorage.setItem(k,v); return true; }catch(e){return null;} }
};

async function load(){
  try{
    const p=await store.get("n3_profile"); if(p) S.profile=JSON.parse(p.value);
    const l=await store.get("n3_log_"+S.activeDay); if(l) S.log=JSON.parse(l.value);
    const w=await store.get("n3_water_"+S.activeDay); if(w) S.water=+w.value||0;
    const ex=await store.get("n3_ex_"+S.activeDay); if(ex) S.exercise=JSON.parse(ex.value);
    const wk=await store.get("n3_week"); if(wk) S.weekData=JSON.parse(wk.value);
    const ch=await store.get("n3_chat"); if(ch) S.chatMsgs=JSON.parse(ch.value);
  }catch(e){}
  if(!S.goalForm) S.goalForm={...S.profile};
  if(!S.chatMsgs.length) S.chatMsgs=[{role:"assistant",content:`Hi${S.profile.name?" "+S.profile.name:""}! 👋 I'm **NutriBot**, your AI coach powered by **Gemini** ✨\n\nYou have **${Math.max(S.profile.calorieTarget-totals().cal,0)} kcal** remaining today. I can suggest meals, analyze recipes, or answer any nutrition question! 🥗`}];
  render();
}
async function saveLog(){ try{ await store.set("n3_log_"+S.activeDay,JSON.stringify(S.log)); saveWeek(); }catch(e){} }
async function saveWater(){ try{ await store.set("n3_water_"+S.activeDay,S.water+""); }catch(e){} }
async function saveEx(){ try{ await store.set("n3_ex_"+S.activeDay,JSON.stringify(S.exercise)); }catch(e){} }
async function saveProfile(){ try{ await store.set("n3_profile",JSON.stringify(S.profile)); }catch(e){} }
async function saveChat(){ try{ await store.set("n3_chat",JSON.stringify(S.chatMsgs.slice(-30))); }catch(e){} }
async function saveWeek(){
  const t=totals();
  const entry={date:S.activeDay,cal:t.cal,target:S.profile.calorieTarget,ex:S.exercise.reduce((a,e)=>a+(e.burned||0),0)};
  S.weekData=S.weekData.filter(d=>d.date!==S.activeDay); S.weekData.push(entry); S.weekData=S.weekData.slice(-7);
  try{ await store.set("n3_week",JSON.stringify(S.weekData)); }catch(e){}
}

// ══════════════════════════════════════
//  GEMINI API  (used for ALL AI tasks)
// ══════════════════════════════════════
async function geminiRequest(parts, systemText=""){
  const contents=[{role:"user",parts}];
  const body={contents,generationConfig:{maxOutputTokens:900,temperature:.7}};
  if(systemText) body.system_instruction={parts:[{text:systemText}]};
  const res=await fetch(`https://generativelanguage.googleapis.com/v1/models/${GM}:generateContent?key=${GK}`,{
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message||"Gemini API error");
  return d.candidates[0].content.parts[0].text;
}

// ── Image analysis (Gemini Vision) ──────────────
async function analyzeImage(b64, mime){
  const prompt=`You are a professional nutritionist. Analyze this food image carefully.
Return ONLY a single valid JSON object — no markdown fences, no extra text:
{"foodName":"...","calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number,"sugar":number,"sodium":number,"servingSize":"...","confidence":"high|medium|low","emoji":"one food emoji","tips":"one short practical nutrition tip about this food"}`;
  const text=await geminiRequest([{inline_data:{mime_type:mime,data:b64}},{text:prompt}]);
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ── Voice / text ingredient analysis ──────────────
async function analyzeIngredients(description){
  const prompt=`You are a professional nutritionist. The user described their meal or ingredients: "${description}"
Analyze the nutritional content based on standard serving sizes.
Return ONLY a single valid JSON object — no markdown fences, no extra text:
{
  "mealName":"concise meal name",
  "ingredients":[{"name":"ingredient","amount":"estimated amount","calories":number,"protein":number,"carbs":number,"fat":number}],
  "totals":{"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number,"sugar":number,"sodium":number},
  "servingSize":"total estimated serving",
  "emoji":"one food emoji",
  "tips":"one practical health tip about this meal"
}`;
  const text=await geminiRequest([{text:prompt}]);
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

// ── Chat (multi-turn with system context) ──────────────
async function chatGemini(msgs, sys){
  const contents=msgs
    .filter(m=>m.role==="user"||m.role==="assistant")
    .map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content.replace(/<[^>]*>/g,"").replace(/\*\*(.*?)\*\*/g,"$1")}]}));
  if(!contents.length||contents[0].role!=="user") contents.unshift({role:"user",parts:[{text:"Hello"}]});
  const res=await fetch(`https://generativelanguage.googleapis.com/v1/models/${GM}:generateContent?key=${GK}`,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents,generationConfig:{maxOutputTokens:500,temperature:.85}})
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.candidates[0].content.parts[0].text;
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
const calcBMI=(w,h)=>+(w/((h/100)**2)).toFixed(1);
const bmiInfo=b=>{
  if(b<18.5) return{l:"Underweight",c:"#4FC3F7",i:"⬆️"};
  if(b<25)   return{l:"Normal weight",c:C.accent,i:"✅"};
  if(b<30)   return{l:"Overweight",c:C.orange,i:"⚠️"};
  return{l:"Obese",c:C.red,i:"🔴"};
};
const calcTDEE=(w,h,age,gender,act)=>{
  const bmr=gender==="male"?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161;
  return Math.round(bmr*({sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryActive:1.9}[act]||1.55));
};
const totals=()=>S.log.reduce((a,f)=>({cal:a.cal+(f.calories||0),p:a.p+(f.protein||0),c:a.c+(f.carbs||0),fat:a.fat+(f.fat||0),fiber:a.fiber+(f.fiber||0)}),{cal:0,p:0,c:0,fat:0,fiber:0});
const burned=()=>S.exercise.reduce((a,e)=>a+(e.burned||0),0);
const netCal=()=>totals().cal-burned();
const remaining=()=>S.profile.calorieTarget-netCal();
const uid=()=>Date.now()+Math.random().toString(36).slice(2,6);
const md=t=>t.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.*?)\*\*/g,"<b>$1</b>").replace(/\*(.*?)\*/g,"<em>$1</em>").replace(/\n/g,"<br>");
function toast(msg,ok=true){S.toast={msg,ok};render();setTimeout(()=>{S.toast=null;render();},2500);}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════
function render(){
  document.getElementById("app").innerHTML=`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">${renderScreen()}</div>
    ${renderNav()}
    ${S.toast?`<div style="position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:${S.toast.ok?C.teal:C.red};color:#000;font-weight:800;font-size:13px;padding:10px 22px;border-radius:24px;z-index:999;animation:pop .3s ease;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px ${S.toast.ok?C.teal:C.red}55">${S.toast.msg}</div>`:""}
    ${S.manualOpen?renderManualModal():""}
  `;
  if(S.screen==="scan"&&S.scanMode==="image"&&S.cameraActive) startCamStream();
  if(S.screen==="chat") scrollChat();
}

// ══════════════════════════════════════
//  NAV
// ══════════════════════════════════════
function renderNav(){
  const tabs=[{id:"home",icon:"⚡",l:"Home"},{id:"scan",icon:"📸",l:"Scan"},{id:"log",icon:"📋",l:"Diary"},{id:"goals",icon:"📊",l:"Stats"},{id:"chat",icon:"🤖",l:"AI Chat"}];
  return`<div style="background:${C.card};border-top:1px solid ${C.border};display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)">
    ${tabs.map(t=>{const a=S.screen===t.id;return`<button onclick="nav('${t.id}')" class="tap" style="flex:1;background:none;border:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative">
      ${a?`<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:${C.accent};border-radius:0 0 2px 2px"></div>`:""}
      <div style="font-size:19px;transition:transform .15s;transform:${a?"scale(1.2) translateY(-1px)":"scale(1)"}">${t.icon}</div>
      <span style="font-size:9.5px;font-weight:${a?700:600};color:${a?C.accent:C.muted};letter-spacing:.3px">${t.l}</span>
    </button>`;}).join("")}
  </div>`;
}
function nav(s){if(S.cameraActive)stopCam();if(S.voiceListening)stopListening();S.screen=s;if(s==="goals"&&!S.goalForm)S.goalForm={...S.profile};render();}
function renderScreen(){
  if(S.screen==="home")  return renderHome();
  if(S.screen==="scan")  return renderScan();
  if(S.screen==="log")   return renderLog();
  if(S.screen==="goals") return renderGoals();
  if(S.screen==="chat")  return renderChat();
  return "";
}

// ══════════════════════════════════════
//  HOME
// ══════════════════════════════════════
function renderHome(){

  const pct=Math.min(net/Math.max(S.profile.calorieTarget,1),1.1);

  const rec=rem>600?"🍽️ Full meal: grilled chicken, rice & veg":rem>350?"🥗 Light: tuna wrap or salad bowl":rem>150?"🍎 Snack: Greek yogurt or protein bar":rem>0?"🥜 Mini snack: ~10 almonds":null;

  const name=S.profile.name?`, ${S.profile.name}`:"";
  return`<div class="screen" style="flex:1;overflow-y:auto;padding:0 14px 16px">

    </div>

    <!-- Calorie Ring -->

        <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg);display:block">
          <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${C.dim}" stroke-width="11"/>
          ${pct>0?`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${over?C.red:C.accent}" stroke-width="11" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)"/>`:""}
          ${b>0?`<circle cx="${sz/2}" cy="${sz/2}" r="${r-14}" fill="none" stroke="${C.blue}55" stroke-width="7" stroke-dasharray="${2*Math.PI*(r-14)}" stroke-dashoffset="${2*Math.PI*(r-14)-Math.min(b/500,1)*2*Math.PI*(r-14)}" stroke-linecap="round"/>`:""}
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">

          <div style="font-size:9px;color:${C.muted}">kcal net</div>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px">
          <div>
            <p style="font-size:10px;color:${C.muted};font-weight:600;text-transform:uppercase;letter-spacing:.8px">${over?"Over":"Remaining"}</p>
            <div style="font-size:30px;font-weight:900;color:${over?C.red:C.accent};font-family:'Bebas Neue',cursive;line-height:1">${Math.abs(Math.round(rem))}<span style="font-size:12px"> kcal</span></div>
          </div>

    </div>`:""}

// ══════════════════════════════════════
//  VOICE RECOGNITION
// ══════════════════════════════════════
function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast("Speech not supported in this browser",false);return;}
  const r=new SR();
  r.continuous=true; r.interimResults=true; r.lang="en-US";
  r.onstart=()=>{S.voiceListening=true;render();};
  r.onresult=e=>{
    let interim="",final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript+" ";
      else interim+=e.results[i][0].transcript;
    }
    if(final){
      S.voiceText=(S.voiceText+" "+final).trim();
    }
    const ta=document.getElementById("voiceTextArea");
    if(ta) ta.value=S.voiceText+(interim?" ("+interim+")":"");
  };
  r.onerror=e=>{S.voiceListening=false;S.voiceErr="🎤 Mic error: "+e.error;render();};
  r.onend=()=>{S.voiceListening=false;render();};
  S.recog=r;
  r.start();
}
function stopListening(){
  if(S.recog){try{S.recog.stop();}catch(e){}}
  S.voiceListening=false; render();
}

  const m=S.manualForm;
  if(!m.name||!m.cal){toast("Name & calories required!",false);return;}
  S.log.push({id:uid(),foodName:m.name,calories:+m.cal,protein:+m.protein||0,carbs:+m.carbs||0,fat:+m.fat||0,fiber:0,servingSize:"1 serving",emoji:m.emoji||"🍽️",time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),source:"manual"});
  S.manualOpen=false;S.manualForm={name:"",cal:"",protein:"",carbs:"",fat:"",emoji:"🍽️"};
  saveLog();render();toast(`${m.name} added ✓`);
}
function addWater(ml){S.water+=ml;saveWater();render();toast(`+${ml}ml 💧`);}
function showExModal(){
  const rates={walking:4,running:10,cycling:7,swimming:9,yoga:3,hiit:13,gym:6,pilates:4,boxing:10,tennis:7,football:8,basketball:8};
  const ex=prompt("Exercise name:\ne.g. Running, Walking, HIIT, Cycling, Yoga, Gym");
  if(!ex)return;
  const dur=prompt(`Duration of "${ex}" in minutes?`);
  if(!dur||isNaN(+dur)||+dur<=0)return;
  const key=Object.keys(rates).find(k=>ex.toLowerCase().includes(k));
  const rate=key?rates[key]:5;
  const kcalBurned=Math.round(+dur*rate*(S.profile.weight/70));
  S.exercise.push({id:uid(),name:ex,duration:+dur,burned:kcalBurned});
  saveEx();render();toast(`${ex} — ${kcalBurned} kcal burned 🔥`);
}
function handleFile(el){
  const file=el.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const url=e.target.result;S.scanPreview=url;S.scanImg={base64:url.split(",")[1],type:file.type||"image/jpeg"};S.scanResult=null;S.scanErr=null;render();};
  reader.readAsDataURL(file);
}
function clearScan(e){e.stopPropagation();S.scanPreview=null;S.scanImg=null;S.scanResult=null;S.scanErr=null;render();}
function startCam(){S.cameraActive=true;S.scanErr=null;render();}
function startCamStream(){
  navigator.mediaDevices?.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:960}}})
    .then(stream=>{S.stream=stream;const v=document.getElementById("camVideo");if(v)v.srcObject=stream;})
    .catch(()=>{S.cameraActive=false;S.scanErr="📷 Camera denied. Upload a photo instead.";render();});
}
function stopCam(){S.cameraActive=false;if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null;}render();}
function capturePhoto(){
  const vid=document.getElementById("camVideo");
  const cvs=document.createElement("canvas");cvs.width=vid.videoWidth||640;cvs.height=vid.videoHeight||480;
  cvs.getContext("2d").drawImage(vid,0,0);
  const url=cvs.toDataURL("image/jpeg",.85);
  S.scanPreview=url;S.scanImg={base64:url.split(",")[1],type:"image/jpeg"};S.scanResult=null;S.scanErr=null;stopCam();
}
async function doAnalyze(){
  if(!S.scanImg||S.scanLoading)return;
  S.scanLoading=true;S.scanErr=null;render();
  try{S.scanResult=await analyzeImage(S.scanImg.base64,S.scanImg.type);}
  catch(e){S.scanErr="❌ "+(e.message||"Analysis failed. Try a clearer photo.");}
  S.scanLoading=false;render();
}
async function doVoiceAnalyze(){
  if(!S.voiceText.trim()||S.voiceLoading)return;
  if(S.voiceListening)stopListening();
  S.voiceLoading=true;S.voiceErr=null;S.voiceResult=null;render();
  try{S.voiceResult=await analyzeIngredients(S.voiceText.trim());}
  catch(e){S.voiceErr="❌ "+(e.message||"Analysis failed. Please rephrase and try again.");}
  S.voiceLoading=false;render();
}
function addToLog(){
  if(!S.scanResult)return;
  S.log.push({...S.scanResult,id:uid(),time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),source:"📸 photo"});
  saveLog();const name=S.scanResult.foodName;S.scanImg=null;S.scanPreview=null;S.scanResult=null;
  nav("log");toast(`${name} added ✓`);
}
function addVoiceToLog(){
  if(!S.voiceResult)return;
  const r=S.voiceResult,t=r.totals;
  S.log.push({id:uid(),foodName:r.mealName,calories:t.calories,protein:t.protein,carbs:t.carbs,fat:t.fat,fiber:t.fiber||0,sugar:t.sugar||0,sodium:t.sodium||0,servingSize:r.servingSize,emoji:r.emoji||"🍽️",time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),source:"🎤 voice"});
  saveLog();const name=r.mealName;S.voiceResult=null;S.voiceText="";
  nav("log");toast(`${name} added ✓`);
}
function removeLog(id){S.log=S.log.filter(f=>f.id!==id);saveLog();render();toast("Removed",false);}
function removeEx(id){S.exercise=S.exercise.filter(e=>e.id!==id);saveEx();render();}
async function saveGoals(){
  const f=S.goalForm;
  const TDEE=calcTDEE(f.weight,f.height,f.age,f.gender,f.activity);
  const tgt={cut:Math.round(TDEE*.8),maintain:TDEE,bulk:Math.round(TDEE*1.15)}[f.goal]||TDEE;
  S.profile={...f,calorieTarget:tgt};S.goalSaved=true;await saveProfile();render();
  toast("Profile saved ✓");setTimeout(()=>{S.goalSaved=false;render();},2500);
}
async function sendChat(){
  const msg=S.chatInput.trim();if(!msg||S.chatLoading)return;
  S.chatInput="";S.chatMsgs.push({role:"user",content:msg});
  S.chatLoading=true;render();scrollChat();
  const rem=Math.max(Math.round(remaining()),0);
  const eaten=S.log.map(f=>f.foodName).join(", ")||"nothing yet";
  const sys=`You are NutriBot, a friendly and expert AI nutrition coach. Be concise (3-5 sentences), practical, motivating. Use emojis naturally. User context: goal=${S.profile.goal}, calorie target=${S.profile.calorieTarget} kcal/day, remaining today=${rem} kcal, eaten today=${eaten}, weight=${S.profile.weight}kg, height=${S.profile.height}cm, BMI=${calcBMI(S.profile.weight,S.profile.height)}. Give specific food suggestions with calorie counts when relevant. Bold key info with **double asterisks**.`;
  try{const reply=await chatGemini(S.chatMsgs,sys);S.chatMsgs.push({role:"assistant",content:reply});}
  catch(e){S.chatMsgs.push({role:"assistant",content:`⚠️ ${e.message||"Gemini connection error. Check your API key."}`});}
  S.chatLoading=false;await saveChat();render();scrollChat();
}
function quickSend(q){S.chatInput=q;sendChat();}
function scrollChat(){setTimeout(()=>{const e=document.getElementById("chatEnd");if(e)e.scrollIntoView({behavior:"smooth"});},80);}

// Service worker
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));

load();
</script>
